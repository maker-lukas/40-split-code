[keyboard]
name = "split keyboard"
product_name = "V1"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "40%ish"
chip = "rp2040"

[layout]
rows = 4
cols = 10
layers = 4

# 34-key layout: outer thumbs (3,2 and 3,7) disabled
# Configure actual keycodes in Vial
# Hand info (L/R) for unilateral_tap HRM support

matrix_map = """
    (0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L)    (0,5,R) (0,6,R) (0,7,R) (0,8,R) (0,9,R)
    (1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L)    (1,5,R) (1,6,R) (1,7,R) (1,8,R) (1,9,R)
    (2,0,L) (2,1,L) (2,2,L) (2,3,L) (2,4,L)    (2,5,R) (2,6,R) (2,7,R) (2,8,R) (2,9,R)
                     (3,2,L) (3,3,L) (3,4,L)    (3,5,R) (3,6,R) (3,7,R)
"""

[[layer]]
name = "base"
keys = """
    A          B          C          D            E          F          G            H            I          J
    MT(A,LGui) MT(S,LAlt) MT(D,LCtrl) MT(F,LShift) G        H          MT(J,RShift) MT(K,RCtrl)  MT(L,RAlt) MT(Semicolon,RGui)
    A          B          C          D            E          F          G            H            I          J
    No         A          B                                  C          A            No
"""

[behavior.morse]
enable_flow_tap = true
unilateral_tap = true
permissive_hold = true
prior_idle_time = "180ms"
hold_timeout = "200ms"

[split]
connection = "serial"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
serial = [
    { instance = "PIO0", tx_pin = "PIN_12", rx_pin = "PIN_13" }
]

[split.central.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_28", "PIN_29", "PIN_0", "PIN_1", "PIN_2"],
    ["PIN_26", "PIN_27", "PIN_3", "PIN_4", "PIN_5"],
    ["PIN_15", "PIN_14", "PIN_6", "PIN_7", "PIN_8"],
    ["_", "_", "PIN_11", "PIN_10", "PIN_9"],
]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5
serial = [
    { instance = "PIO0", tx_pin = "PIN_13", rx_pin = "PIN_12" }]

[split.peripheral.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_2", "PIN_1", "PIN_0", "PIN_29", "PIN_28"],
    ["PIN_5", "PIN_4", "PIN_3", "PIN_27", "PIN_26"],
    ["PIN_8", "PIN_7", "PIN_6", "PIN_14", "PIN_15"],
    ["PIN_9", "PIN_10", "PIN_11", "_", "_"],
]
